spring:
  application:
    name: enterprise-ai-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    mcp:
      server:
        enabled: true
        name: enterprise-mcp-server
        version: 0.0.1
        type: SYNC
        sse-message-endpoint: /mcp/message
        tool-change-notification: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/enterprise_ai_agent?serverTimezone=Asia/Shanghai&useSSL=false}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
server:
  port: 8123
  servlet:
      context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.shixi.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== RAG 增强配置 ====================
rag:
  hybrid-search:
    # 向量检索返回数量
    vector-top-k: 20
    # 关键词检索返回数量
    keyword-top-k: 20
    # 最终返回数量
    final-top-k: 5
    # RRF 融合参数
    rrf-k: 60
    # 向量检索权重
    vector-weight: 0.5
    # 关键词检索权重
    keyword-weight: 0.5
    # 是否启用重排序
    enable-rerank: true
    # 是否启用查询改写
    enable-query-rewrite: true
  # 引用溯源
  citation:
    # 是否显示引用来源
    enabled: true
    # 最大显示引用数
    max-citations: 3

# ==================== 知识库配置 ====================
knowledge:
  base-path: ${KNOWLEDGE_BASE_PATH:src/main/resources/documents}

enterprise:
  security:
    jwt:
      secret: ${JWT_SECRET:enterprise-ai-agent-change-me-in-production}
      ttl-seconds: 86400
